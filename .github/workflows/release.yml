name: Release

# Tag a version (e.g. v0.1.0) to build the Windows installers, sign them for the
# updater, and publish a GitHub Release with a `latest.json` for auto-update.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build, sign, and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Chrona ${{ github.ref_name }}"
          releaseBody: |
            Chrona — a frameless desktop clock + live-weather glass widget for Windows.

            ## Install
            Download **`Chrona_*_x64-setup.exe`** (recommended) or the **`.msi`** below and run it.
            Requires the Microsoft WebView2 runtime (preinstalled on Windows 11).

            Once installed, Chrona keeps itself up to date automatically.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ""
